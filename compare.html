<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGE PDP Comparator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#080b10;--surface:#0f1419;--surface2:#161d27;--border:#1e2a38;--accent:#6ee7b7;--accent2:#818cf8;--danger:#f87171;--warn:#fbbf24;--ok:#34d399;--text:#e2e8f0;--muted:#64748b;--asis:#38bdf8;--tobe:#a78bfa;--hh:54px;--th:36px;--pw:400px;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;font-size:13px;}
body{display:flex;flex-direction:column;}
#hdr{height:var(--hh);min-height:var(--hh);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;z-index:100;flex-shrink:0;}
#logo{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);white-space:nowrap;}
.sep{width:1px;height:20px;background:var(--border);}
#modelInput{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:12px;width:200px;font-family:monospace;}
#modelInput:focus{outline:none;border-color:var(--accent);}
#modelInput::placeholder{color:var(--muted);}
.btn{padding:6px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.02em;}
.btn:active{transform:scale(.97);}
.btn-a{background:var(--accent);color:#060d0a;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-g:hover{border-color:var(--accent2);color:var(--accent2);}
.tgl-label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;user-select:none;}
.tgl-label input{display:none;}
.tgl{width:32px;height:17px;background:var(--border);border-radius:99px;position:relative;transition:background .2s;}
.tgl::after{content:'';position:absolute;width:13px;height:13px;background:white;border-radius:50%;top:2px;left:2px;transition:left .2s;}
.tgl-label input:checked+.tgl{background:var(--accent);}
.tgl-label input:checked+.tgl::after{left:17px;}
#hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px;}
#urlbar{height:var(--th);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;}
.url-cell{flex:1;display:flex;align-items:center;padding:0 12px;gap:8px;border-right:1px solid var(--border);}
.url-cell:last-child{border-right:none;}
.ubadge{font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.ba{background:color-mix(in srgb,var(--asis) 15%,transparent);color:var(--asis);border:1px solid color-mix(in srgb,var(--asis) 30%,transparent);}
.bt{background:color-mix(in srgb,var(--tobe) 15%,transparent);color:var(--tobe);border:1px solid color-mix(in srgb,var(--tobe) 30%,transparent);}
.url-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:5px 8px;font-size:11px;font-family:monospace;min-width:0;}
.url-input:focus{outline:none;border-color:var(--accent2);}
#main{display:flex;flex:1;min-height:0;}
.pane{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;border-right:1px solid var(--border);}
.pane:last-of-type{border-right:none;}
.pane-hdr{height:28px;min-height:28px;display:flex;align-items:center;padding:0 10px;gap:6px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.pt{font-size:11px;font-weight:600;}
.pt-a{color:var(--asis);}
.pt-t{color:var(--tobe);}
.pane-st{margin-left:auto;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.dot.loading{background:var(--warn);animation:pulse 1s infinite;}
.dot.ready{background:var(--ok);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pane iframe{flex:1;width:100%;border:none;background:white;}
#divider{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;}
#divider:hover,#divider.dragging{background:var(--accent2);}
#sp{width:var(--pw);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s;overflow:hidden;}
#sp.collapsed{width:0;}
#ptabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.ptab{flex:1;padding:10px 0;text-align:center;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.ptab.active{color:var(--accent);border-bottom-color:var(--accent);}
.pbody{flex:1;overflow-y:auto;padding:12px;display:none;}
.pbody.active{display:block;}
#runDiff{width:100%;margin-bottom:12px;padding:8px;background:color-mix(in srgb,var(--accent) 15%,transparent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:6px;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;}
.diff-sum{display:flex;gap:8px;margin-bottom:10px;}
.dbadge{flex:1;text-align:center;padding:6px 4px;border-radius:6px;font-size:11px;font-weight:700;}
.dbadge.ok{background:color-mix(in srgb,var(--ok) 12%,transparent);color:var(--ok);border:1px solid color-mix(in srgb,var(--ok) 25%,transparent);}
.dbadge.diff{background:color-mix(in srgb,var(--danger) 12%,transparent);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 25%,transparent);}
.dbadge.miss{background:color-mix(in srgb,var(--warn) 12%,transparent);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 25%,transparent);}
.drow{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;}
.drow.mismatch{border-color:color-mix(in srgb,var(--danger) 50%,transparent);}
.drow.missing{border-color:color-mix(in srgb,var(--warn) 50%,transparent);}
.dkey{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.dvals{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dval{font-size:11px;padding:5px 7px;border-radius:5px;word-break:break-all;line-height:1.4;}
.dval.asis{background:color-mix(in srgb,var(--asis) 8%,transparent);color:var(--asis);border:1px solid color-mix(in srgb,var(--asis) 20%,transparent);}
.dval.tobe{background:color-mix(in srgb,var(--tobe) 8%,transparent);color:var(--tobe);border:1px solid color-mix(in srgb,var(--tobe) 30%,transparent);}
.nv{color:var(--muted);font-style:italic;}
.clbl{font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
#selCfg{width:100%;height:calc(100vh - 280px);background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:monospace;font-size:10px;padding:8px;resize:vertical;margin-bottom:10px;}
#apiSt{font-size:11px;color:var(--muted);text-align:center;padding:20px 0;}
.aurl{font-family:monospace;font-size:10px;color:var(--accent2);word-break:break-all;background:var(--surface2);padding:6px 8px;border-radius:5px;margin-bottom:8px;border:1px solid var(--border);}
#apiJson{font-family:monospace;font-size:10px;line-height:1.6;white-space:pre-wrap;word-break:break-word;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;max-height:calc(100vh - 280px);overflow-y:auto;color:#a5f3fc;}
.overlay{position:absolute;inset:0;background:rgba(8,11,16,.7);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);gap:8px;z-index:50;pointer-events:none;opacity:0;transition:opacity .3s;}
.overlay.show{opacity:1;pointer-events:all;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;z-index:9999;transition:transform .3s;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
.perf-section{margin-bottom:14px;}
.perf-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.perf-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:6px;align-items:center;}
.perf-label{font-size:10px;color:var(--muted);letter-spacing:.03em;}
.perf-val{font-size:11px;font-family:monospace;padding:3px 6px;border-radius:4px;text-align:right;}
.perf-val.asis-v{background:color-mix(in srgb,var(--asis) 10%,transparent);color:var(--asis);border:1px solid color-mix(in srgb,var(--asis) 20%,transparent);}
.perf-val.tobe-v{background:color-mix(in srgb,var(--tobe) 10%,transparent);color:var(--tobe);border:1px solid color-mix(in srgb,var(--tobe) 20%,transparent);}
.perf-val.win{font-weight:700;box-shadow:0 0 0 1px var(--ok);}
.perf-val.lose{opacity:.7;}
.perf-hdr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.perf-hdr span:nth-child(2){text-align:right;color:var(--asis);}
.perf-hdr span:nth-child(3){text-align:right;color:var(--tobe);}
.pane.mobile-view{justify-content:center;overflow:hidden;}
.pane.mobile-view iframe{flex:none!important;width:480px!important;max-width:480px!important;height:100%;border:2px solid var(--accent2);border-radius:8px;margin:0 auto;display:block;}
</style>
</head>
<body>
<div id="hdr">
  <span id="logo">&#x2B21; PDP Comparator</span><div class="sep"></div>
  <input id="modelInput" type="text" placeholder="모델 ID (예: MD10521846)">
  <select id="pdpTypeSelect" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:11px;">
    <option value="PURCHASE">일시불</option>
    <option value="SUBSCRIPTION">구독</option>
  </select>
  <button class="btn btn-a" id="loadBtn">비교 로드</button>
  <button class="btn btn-g" id="reloadBtn">&#x21BA; 새로고침</button>
  <div class="sep"></div>
  <label class="tgl-label"><input type="checkbox" id="syncScroll" checked><span class="tgl"></span>스크롤 동기화</label>
  <label class="tgl-label"><input type="checkbox" id="mobileMode" checked><span class="tgl"></span>모바일</label>
  <div id="hdr-r"><button class="btn btn-g" id="panelBtn">&#x25B6; 비교 패널</button></div>
</div>
<div id="urlbar">
  <div class="url-cell"><span class="ubadge ba">AS-IS</span><input class="url-input" id="asisUrl" readonly placeholder="모델 ID 입력 후 비교 로드"></div>
  <div class="url-cell"><span class="ubadge bt">TO-BE</span><input class="url-input" id="tobeUrl" readonly placeholder="모델 ID 입력 후 비교 로드"></div>
</div>
<div id="main">
  <div class="pane" id="asisPW">
    <div class="pane-hdr"><span class="ubadge ba">AS-IS</span><span class="pt pt-a" id="asisT">JSP PDP</span><div class="pane-st"><div class="dot" id="asisD"></div><span id="asisSt">대기 중</span></div></div>
    <iframe id="asisF" data-role="asis" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation-by-user-activation"></iframe>
    <div class="overlay" id="asisOv"><div class="spinner"></div> 로딩 중...</div>
  </div>
  <div id="divider"></div>
  <div class="pane" id="tobePW">
    <div class="pane-hdr"><span class="ubadge bt">TO-BE</span><span class="pt pt-t" id="tobeT">Next.js PDP</span><div class="pane-st"><div class="dot" id="tobeD"></div><span id="tobeSt">대기 중</span></div></div>
    <iframe id="tobeF" data-role="tobe" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation-by-user-activation"></iframe>
    <div class="overlay" id="tobeOv"><div class="spinner"></div> 로딩 중...</div>
  </div>
  <div id="sp">
    <div id="ptabs">
      <div class="ptab active" data-tab="diff">DOM 비교</div>
      <div class="ptab" data-tab="perf">성능</div>
      <div class="ptab" data-tab="config">셀렉터 설정</div>
      <div class="ptab" data-tab="api">API 응답</div>
    </div>
    <div class="pbody active" id="tab-diff">
      <button id="runDiff">&#x25B6; DOM 비교 실행</button>
      <div id="dsum" class="diff-sum" style="display:none">
        <div class="dbadge ok" id="okC">&#x2713; 0 일치</div>
        <div class="dbadge diff" id="diffC">&#x2717; 0 불일치</div>
        <div class="dbadge miss" id="missC">? 0 미추출</div>
      </div>
      <div id="dres"></div>
    </div>
    <div class="pbody" id="tab-perf">
      <div id="perfSt" style="font-size:11px;color:var(--muted);text-align:center;padding:20px 0">페이지 로드 완료 후 자동 측정됩니다</div>
      <div id="perfRes"></div>
    </div>
    <div class="pbody" id="tab-config">
      <div class="clbl">DOM 비교 셀렉터 설정 (JSON)</div>
      <textarea id="selCfg" spellcheck="false"></textarea>
      <button class="btn btn-a" id="saveCfg" style="width:100%;padding:7px">저장</button>
      <p style="color:var(--muted);font-size:10px;margin-top:8px;line-height:1.5">key: 비교 항목 이름<br>asis: AS-IS CSS 셀렉터<br>tobe: TO-BE CSS 셀렉터</p>
    </div>
    <div class="pbody" id="tab-api">
      <div id="apiSt">페이지를 로드하면 TO-BE API 응답이<br>자동으로 캡처됩니다.</div>
      <div id="apiCont" style="display:none"><div class="aurl" id="apiUrl"></div><div id="apiJson"></div></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="compare.js"></script>
</body>
</html>
